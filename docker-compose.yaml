services:
  apisix:
    image: ghcr.io/wearefrank/frank-gateway:master
    restart: always
    configs:
      - source: apisix_routes
        target: /usr/local/apisix/conf/apisix.yaml
      - source: apisix_config
        target: /usr/local/apisix/conf/config.yaml
    ports:
      - "9180:9180"   # Admin API
      - "9880:9080"   # HTTP proxy
      - "9881:9091"   # Prometheus metrics
      - "9882:9092"   # Control API (/v1/schema)
      - "9443:9443"   # HTTPS proxy
    env_file:
      - path: ./.env
        required: false

  prometheus:
    image: prom/prometheus:latest
    restart: always
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  httpbin:
    image: kong/httpbin:latest
    restart: always
    ports:
      - "80:80"

  # FederatedGateWay management UI - start with: docker compose --profile ui up
  backend:
    image: ghcr.io/tijmensosef/federated-gateway-backend:latest
    restart: always
    profiles: [ui]
    ports:
      - "8080:8080"
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - APISIX_HOST=http://apisix
    volumes:
      - backend_data:/data
    depends_on:
      - apisix

  frontend:
    image: ghcr.io/tijmensosef/federated-gateway-frontend:latest
    restart: always
    profiles: [ui]
    ports:
      - "3000:80"
    depends_on:
      - backend

configs:
  apisix_routes:
    content: |
      routes: []
      #END
  apisix_config:
    content: |
      apisix:
        enable_control: true
        control:
          ip: "0.0.0.0"
          port: 9092
        enable_admin: false
        extra_lua_path: "/usr/local/apisix/custom-plugins/?.lua"
        extra_lua_cpath: "/usr/local/apisix/custom-plugin-libs/?.so"

      nginx_config:
        http:
          custom_lua_shared_dict:
            fsc-registration: 1m
            openid-connect-client-cache: 1m
            generic-oauth-client-cache: 1m
            jwt-client-cache: 1m

      plugins:
        - real-ip
        - ai
        - client-control
        - proxy-control
        - request-id
        - zipkin
        - ext-plugin-pre-req
        - fault-injection
        - mocking
        - serverless-pre-function
        - cors
        - ip-restriction
        - ua-restriction
        - referer-restriction
        - csrf
        - uri-blocker
        - request-validation
        - chaitin-waf
        - multi-auth
        - openid-connect
        - cas-auth
        - authz-casbin
        - authz-casdoor
        - wolf-rbac
        - ldap-auth
        - hmac-auth
        - basic-auth
        - jwt-auth
        - jwe-decrypt
        - key-auth
        - consumer-restriction
        - forward-auth
        - opa
        - authz-keycloak
        - proxy-cache
        - body-transformer
        - proxy-mirror
        - proxy-rewrite
        - workflow
        - api-breaker
        - limit-conn
        - limit-count
        - limit-req
        - gzip
        - server-info
        - traffic-split
        - redirect
        - response-rewrite
        - degraphql
        - kafka-proxy
        - grpc-transcode
        - grpc-web
        - public-api
        - prometheus
        - datadog
        - loki-logger
        - elasticsearch-logger
        - echo
        - loggly
        - http-logger
        - splunk-hec-logging
        - skywalking-logger
        - google-cloud-logging
        - sls-logger
        - tcp-logger
        - kafka-logger
        - rocketmq-logger
        - syslog
        - udp-logger
        - file-logger
        - clickhouse-logger
        - tencent-cloud-cls
        - inspect
        - example-plugin
        - cert-auth
        - frank-sender
        - generic-oauth-client
        - jwt-client
        - limit-size
        - soap-action-router
        - openid-connect-client
        - fsc
        - aws-lambda
        - azure-functions
        - openwhisk
        - openfunction
        - serverless-post-function
        - ext-plugin-post-req
        - ext-plugin-post-resp

      plugin_attr:
        prometheus:
          enable_export_server: true
          export_addr:
            ip: 0.0.0.0
            port: 9091
          metrics:
            http_status:
              extra_labels:
                - upstream_addr: $$upstream_addr
                - status: $$upstream_status
                - soap_action: $$soap_action

      deployment:
        role: data_plane
        role_data_plane:
          config_provider: yaml
  prometheus_config:
    content: |
      global:
        scrape_interval: 1s
        external_labels:
          stack: "apisix"
      scrape_configs:
        - job_name: "prometheus"
          scrape_interval: 5s
          static_configs:
            - targets: ["localhost:9090"]
        - job_name: "apisix"
          scrape_interval: 5s
          metrics_path: "/apisix/prometheus/metrics"
          static_configs:
            - targets: ["apisix:9091"]

volumes:
  backend_data:

networks:
  default:
    driver: bridge
