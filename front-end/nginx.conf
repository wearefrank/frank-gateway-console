server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Strip Origin header so Spring's CORS filter does not reject proxied requests.
        # The browser treats this as same-origin (port 3000 → port 3000), so no CORS
        # headers are needed on the response either.
        proxy_set_header Origin "";
    }

    # SPA fallback: serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
