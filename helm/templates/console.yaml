apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-console-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-console
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-console
    spec:
      containers:
        - name: console
          image: {{ .Values.console.image }}
          imagePullPolicy: Always
          env:
            - name: PROMETHEUS_URL
              value: "http://{{ .Release.Name }}-prometheus:9090"
            - name: APISIX_HOST
              value: "http://{{ .Release.Name }}-frankgateway"
            - name: APISIX_CONTROL_PORT
              value: "9092"
            - name: APISIX_METRICS_PORT
              value: "9091"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-console-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-console
spec:
  type: LoadBalancer
  selector:
    app: {{ .Release.Name }}-console
  ports:
    - port: {{ .Values.console.port }}
      targetPort: 8080
