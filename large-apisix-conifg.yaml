routes:
  - id: "route_1_basic_crud"
    name: "User API Route"
    uri: "/api/v1/users/*"
    methods: ["GET", "POST", "PUT", "DELETE"]
    host: "api.example.com"
    service_id: "service_1"
    plugins:
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 429
      prometheus: {}
    timeout:
      connect: 3
      send: 3
      read: 3
    status: 1

  - id: "route_2_auth"
    name: "Authentication Route"
    uris:
      - "/api/v2/auth"
      - "/api/v2/login"
    methods: ["POST"]
    upstream_id: "upstream_1"
    plugins:
      jwt-auth: {}
      proxy-rewrite:
        uri: "/internal/auth"
        host: "internal.example.com"

  - id: "route_3_inline_upstream"
    name: "GraphQL Gateway"
    uri: "/graphql"
    upstream:
      nodes:
        "127.0.0.1:8080": 1
        "127.0.0.2:8080": 2
      type: roundrobin
    plugins:
      cors:
        allow_origins: "*"
        allow_methods: "**"
        allow_headers: "**"
        expose_headers: "*"
        max_age: 3600

services:
  - id: "service_1"
    name: "user_service"
    upstream_id: "upstream_1"
    plugins:
      zipkin:
        endpoint: "http://127.0.0.1:9411/api/v2/spans"
        sample_ratio: 1.0

upstreams:
  - id: "upstream_1"
    name: "backend_nodes"
    type: "chash"
    key: "remote_addr"
    nodes:
      "10.0.0.1:80": 10
      "10.0.0.2:80": 10
      "10.0.0.3:80": 5
    timeout:
      connect: 5
      send: 5
      read: 5
    checks:
      active:
        type: http
        http_path: "/healthz"
        host: "backend.example.local"
        healthy:
          interval: 2
          successes: 2
        unhealthy:
          interval: 1
          http_failures: 2
          timeouts: 3
      passive:
        healthy:
          http_statuses: [200, 201]
          successes: 3
        unhealthy:
          http_failures: 3
          http_statuses: [500, 502, 503, 504]
          timeouts: 3

consumers:
  - username: "test_consumer"
    plugins:
      jwt-auth:
        key: "user-key"
        secret: "my-secret-key"
      limit-req:
        rate: 10
        burst: 5
        rejected_code: 429

global_rules:
  - id: "rule_1_global_tracing"
    plugins:
      request-id:
        header_name: "X-Request-Id"
        algorithm: "uuid"