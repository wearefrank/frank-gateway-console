routes:
  -
    id: 1
    uri: "/hello"
    upstream_id: 1
    plugins:
      prometheus: {}
      limit-count:
        count: 2
        time_window: 60
        rejected_code: 503
        policy: local
  -
    id: 2
    uri: "/world"
    upstream:
      nodes:
        "127.0.0.1:1980": 1
      type: roundrobin
    plugins:
      response-rewrite:
        body: "hello world\n"

upstreams:
  -
    id: 1
    nodes:
      "127.0.0.1:8080": 1
      "127.0.0.1:8081": 1
    type: roundrobin

services:
  -
    id: 1
    upstream_id: 1
    plugins:
      limit-count:
        count: 2
        time_window: 60
        rejected_code: 503

consumers:
  -
    username: jack
    plugins:
      key-auth:
        key: auth-one
  -
    username: rose
    plugins:
      basic-auth:
        username: rose
        password: rose-password

# Global Plugin Rules
global_rules:
  -
    id: 1
    plugins:
      limit-count:
        count: 100
        time_window: 60
        rejected_code: 503
        key: remote_addr